spring:
  config:
    import: "optional:file:./.env[.properties]"
  application:
    name: LintSec
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  data:
    web:
      pageable:
        max-page-size: 100   # cap client-supplied ?size= so a scan list page can't request 100000 rows

server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      cookie:
        name: LINTSEC_SESSION
        http-only: true
        same-site: lax

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

lintsec:
  frontend:
    base-url: ${LINTSEC_FRONTEND_BASE_URL:http://localhost:5173}
  mail:
    from: ${LINTSEC_MAIL_FROM:no-reply@lintsec.local}
  crawler:
    max-depth: ${LINTSEC_CRAWLER_MAX_DEPTH:3}
    max-pages: ${LINTSEC_CRAWLER_MAX_PAGES:50}
    request-delay-ms: ${LINTSEC_CRAWLER_REQUEST_DELAY_MS:500}
    user-agent: "LintSec-Scanner/0.1 (+https://lintsec.local)"
  scan:
    max-duration-minutes: ${LINTSEC_SCAN_MAX_DURATION_MINUTES:5}
    max-concurrent-per-user: ${LINTSEC_SCAN_MAX_CONCURRENT_PER_USER:3}
  ai:
    provider: gemini
    gemini-api-key: ${GEMINI_API_KEY:}
    model: ${LINTSEC_AI_MODEL:gemini-2.5-flash-lite}
    cache-ttl-hours: ${LINTSEC_AI_CACHE_TTL_HOURS:24}
