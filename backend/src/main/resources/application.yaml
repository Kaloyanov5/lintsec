spring:
  application:
    name: LintSec
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      cookie:
        name: LINTSEC_SESSION
        http-only: true
        same-site: lax

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

lintsec:
  crawler:
    max-depth: ${LINTSEC_CRAWLER_MAX_DEPTH:3}
    max-pages: ${LINTSEC_CRAWLER_MAX_PAGES:50}
    request-delay-ms: ${LINTSEC_CRAWLER_REQUEST_DELAY_MS:500}
    user-agent: "LintSec-Scanner/0.1 (+https://lintsec.local)"
  scan:
    max-duration-minutes: ${LINTSEC_SCAN_MAX_DURATION_MINUTES:5}
  ai:
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    model: ${LINTSEC_AI_MODEL:claude-haiku-4-5-20251001}
    cache-ttl-hours: ${LINTSEC_AI_CACHE_TTL_HOURS:24}
